name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'sevillaneando/apps/backend/**'

jobs:
  deploy:
    name: Trigger Render deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  autofix:
    name: Autofix lint & format
    runs-on: ubuntu-latest
    # Solo en push directo, no en PRs (en PRs el autor debe corregir)
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        working-directory: sevillaneando/apps/backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: sevillaneando/apps/frontend
        run: npm ci

      - name: Autofix backend
        working-directory: sevillaneando/apps/backend
        run: npm run lint:fix && npm run format
        continue-on-error: true

      - name: Autofix frontend
        working-directory: sevillaneando/apps/frontend
        run: npm run lint:fix && npm run format
        continue-on-error: true

      - name: Commit fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto lint & format fixes"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"

  ci-backend:
    name: Backend — lint, type-check, test, build
    runs-on: ubuntu-latest
    needs: autofix
    if: always()
    defaults:
      run:
        working-directory: sevillaneando/apps/backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sevillaneando/apps/backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test -- --passWithNoTests

      - name: Build
        run: npm run build

  ci-frontend:
    name: Frontend — lint, type-check
    runs-on: ubuntu-latest
    needs: autofix
    if: always()
    defaults:
      run:
        working-directory: sevillaneando/apps/frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: sevillaneando/apps/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check
